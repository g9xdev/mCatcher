<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Media Catcher</title>
</head>

<body>
  <header class="bar">
    <div class="brand">
      <div class="brand-name">MEDIA<em>■</em>CATCHER</div>
      <div class="brand-sub"></div>
    </div>
    <div class="bar-actions">
      <button id="alltabs" class="icon-btn" title="Show streams from all tabs" aria-label="Show streams from all tabs">
        <svg viewBox="0 0 16 16">
          <rect x="2" y="2" width="5" height="5" rx="1" />
          <rect x="9" y="2" width="5" height="5" rx="1" />
          <rect x="2" y="9" width="5" height="5" rx="1" />
          <rect x="9" y="9" width="5" height="5" rx="1" />
        </svg>
      </button>
      <button id="refresh" class="icon-btn" title="Rescan" aria-label="Rescan">
        <svg viewBox="0 0 16 16">
          <path d="M13 8a5 5 0 1 1-1.5-3.5M13 2v3h-3" />
        </svg>
      </button>
      <button id="settings" class="icon-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 16 16">
          <circle cx="8" cy="8" r="2.2" />
          <path
            d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4" />
        </svg>
      </button>
      <button id="clear" class="icon-btn" title="Clear list" aria-label="Clear list">
        <svg viewBox="0 0 16 16">
          <path d="M3 4h10M6 4V2.5h4V4M5 4l.7 9h4.6L11 4" />
        </svg>
      </button>
    </div>
  </header>

  <div id="status" class="status">Watching this tab for streams…</div>

  <main id="list" class="list" aria-live="polite"></main>

  <footer class="foot">
    <div class="f-inner">
      <span id="foot-count">0 streams</span>
      <button id="helper-badge" title="Recording engine" aria-label="Recording engine status"></button>
    </div>
    <span class="foot-note">Only save content you have the right to.</span>
  </footer>

  <script src="popup.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Media Catcher</title>
</head>

<body data-theme="acrylic-night">
  <header class="bar">
    <div class="brand">
      <div class="brand-name">Media Catcher</div>
      <div class="brand-sub" id="brand-sub">Current tab media</div>
    </div>
    <div class="bar-actions">
      <button id="hdr-cast" class="icon-btn" title="Cast — no active session" aria-label="Casting">
        <svg viewBox="0 0 16 16">
          <path d="M2 4.8V4a1.6 1.6 0 0 1 1.6-1.6h8.8A1.6 1.6 0 0 1 14 4v8a1.6 1.6 0 0 1-1.6 1.6H8.6" />
          <path d="M2 8.2a5.4 5.4 0 0 1 5.4 5.4M2 11a2.6 2.6 0 0 1 2.6 2.6" />
        </svg>
        <span class="dot"></span>
      </button>
      <span class="bar-sep"></span>
      <button id="alltabs" class="icon-btn" title="Show streams from all tabs" aria-label="Show streams from all tabs">
        <svg viewBox="0 0 16 16">
          <rect x="2" y="2" width="5" height="5" rx="1" />
          <rect x="9" y="2" width="5" height="5" rx="1" />
          <rect x="2" y="9" width="5" height="5" rx="1" />
          <rect x="9" y="9" width="5" height="5" rx="1" />
        </svg>
      </button>
      <button id="refresh" class="icon-btn" title="Rescan" aria-label="Rescan">
        <svg viewBox="0 0 16 16">
          <path d="M13 8a5 5 0 1 1-1.5-3.5M13 2v3h-3" />
        </svg>
      </button>
      <button id="update" class="icon-btn" title="Check for updates" aria-label="Check for updates">
        <svg viewBox="0 0 16 16">
          <path d="M8 2.5v6.5M5 6l3 3 3-3M3.5 13.2h9" />
        </svg>
      </button>
      <button id="settings" class="icon-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 16 16">
          <circle cx="8" cy="8" r="2.2" />
          <path
            d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4" />
        </svg>
      </button>
      <button id="clear" class="icon-btn" title="Clear list" aria-label="Clear list">
        <svg viewBox="0 0 16 16">
          <path d="M3 4h10M6 4V2.5h4V4M5 4l.7 9h4.6L11 4" />
        </svg>
      </button>
    </div>
  </header>

  <div id="status" class="status">Watching this tab for streams…</div>

  <div class="main">
    <section class="pane-left">
      <div class="pane-title">
        Media on this tab <span class="count" id="left-count">0</span>
        <span class="spacer"></span>
        <button id="alltabs2" class="linkish" title="Show detected streams from every open tab">All tabs</button>
      </div>
      <main id="list" class="list" aria-live="polite"></main>
    </section>

    <aside class="pane-right" aria-label="Casting and downloads">
      <div class="pane-title" id="cast-title">Now casting</div>
      <div class="rail" id="rail">
        <div id="cast-slot"></div>
        <div class="pane-title sub" id="queue-title">
          Downloads <span class="count" id="queue-count">0</span>
          <span class="spacer"></span>
          <button id="queue-clear" class="linkish" title="Dismiss finished downloads">Clear done</button>
        </div>
        <div id="queue"></div>
      </div>
    </aside>
  </div>

  <footer class="foot">
    <div class="f-inner">
      <span id="foot-count">0 streams</span>
      <button id="helper-badge" title="Recording engine" aria-label="Recording engine status"></button>
    </div>
    <span class="foot-note">Only save or cast content you have the right to.</span>
  </footer>

  <!-- Cast device picker (populated at runtime) -->
  <div class="popover" id="pop-cast" role="menu" aria-label="Cast to a device"></div>

  <script src="popup.js"></script>
</body>

</html>

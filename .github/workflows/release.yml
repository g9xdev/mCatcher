name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and release (no leading v, e.g. 1.4.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check host
        shell: pwsh
        run: |
          python -m py_compile media-catcher-host/mc_host.py
          python media-catcher-host/test_guardian.py

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'push' -and $env:GITHUB_REF_NAME -match '^v(.+)$') {
            $v = $Matches[1]
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          if ([string]::IsNullOrWhiteSpace($v)) { throw 'Could not determine version.' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building Media Catcher $v"

      - name: Stamp version into sources
        shell: pwsh
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          $v = $env:V
          $mf = 'media-catcher/manifest.json'
          (Get-Content $mf -Raw) -replace '"version"\s*:\s*"[0-9.]+"', ('"version": "' + $v + '"') |
            Set-Content $mf -NoNewline -Encoding utf8
          $hp = 'media-catcher-host/mc_host.py'
          (Get-Content $hp -Raw) -replace 'VERSION\s*=\s*"[0-9.]+"', ('VERSION = "' + $v + '"') |
            Set-Content $hp -NoNewline -Encoding utf8
          $iss = 'media-catcher-host/installer/media-catcher-host.iss'
          (Get-Content $iss -Raw) -replace '#define AppVersion "[0-9.]+"', ('#define AppVersion "' + $v + '"') |
            Set-Content $iss -NoNewline -Encoding utf8

      - name: Package extension + host zips
        shell: pwsh
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          $v = $env:V
          New-Item -ItemType Directory -Force dist | Out-Null
          # Extension: manifest.json must sit at the zip root -> archive the folder CONTENTS
          Compress-Archive -Path 'media-catcher/*' -DestinationPath "dist/media_catcher-$v.zip" -Force
          # Host: only the runtime files (no ffmpeg, tests, installer, or machine files)
          New-Item -ItemType Directory -Force host-staging | Out-Null
          Copy-Item 'media-catcher-host/mc_host.py','media-catcher-host/guardian.ps1','media-catcher-host/README.md' host-staging/
          Compress-Archive -Path 'host-staging/*' -DestinationPath "dist/media-catcher-host-$v.zip" -Force

      - name: Build installer (MediaCatcherHostSetup.exe)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress | Out-Null
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw "ISCC not found at $iscc" }
          & $iscc 'media-catcher-host/installer/media-catcher-host.iss'
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed (exit $LASTEXITCODE)" }
          Copy-Item 'media-catcher-host/installer/dist/MediaCatcherHostSetup.exe' 'dist/MediaCatcherHostSetup.exe' -Force

      - name: Sign extension (.xpi) via AMO
        id: sign
        continue-on-error: true
        shell: pwsh
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          if (-not $env:AMO_JWT_ISSUER -or -not $env:AMO_JWT_SECRET) {
            Write-Host "::warning::AMO secrets not set — skipping the signed .xpi."
            exit 0
          }
          New-Item -ItemType Directory -Force signed | Out-Null
          # Sign the stamped source as an unlisted (self-distribution) build.
          npx --yes web-ext sign `
            --source-dir media-catcher `
            --api-key "$env:AMO_JWT_ISSUER" --api-secret "$env:AMO_JWT_SECRET" `
            --channel unlisted --artifacts-dir signed --timeout 600000
          $xpi = Get-ChildItem signed -Filter *.xpi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($xpi) {
            Copy-Item $xpi.FullName "dist/media_catcher-$v.xpi" -Force
            Write-Host "Signed -> dist/media_catcher-$v.xpi"
            # Firefox self-hosted update manifest -> points at this version's signed xpi.
            $addonId = "{27383706-fb43-40dc-9e94-d2578818bd6a}"
            $link = "https://github.com/g9xdev/mCatcher/releases/download/v$v/media_catcher-$v.xpi"
            $updates = @{ addons = @{ $addonId = @{ updates = @(@{ version = $v; update_link = $link }) } } }
            $updates | ConvertTo-Json -Depth 8 | Set-Content 'dist/updates.json' -Encoding utf8
            Write-Host "Wrote dist/updates.json (update_link -> $link)"
          } else {
            Write-Host "::warning::No signed .xpi produced (validation error, or v$v already signed)."
          }

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          $v = $env:V
          $files = @(
            "dist/media_catcher-$v.zip",
            "dist/media-catcher-host-$v.zip",
            "dist/MediaCatcherHostSetup.exe"
          )
          if (Test-Path "dist/media_catcher-$v.xpi") {
            $files += "dist/media_catcher-$v.xpi"
            Write-Host "Attaching signed .xpi."
          } else {
            Write-Host "::warning::No signed .xpi to attach to this release."
          }
          if (Test-Path "dist/updates.json") {
            $files += "dist/updates.json"
            Write-Host "Attaching updates.json (Firefox self-hosted auto-update manifest)."
          }
          gh release create "v$v" $files --title "Media Catcher $v" --generate-notes
